name: Update Commonwealth Club Calendar

on:
  schedule:
    # Run on the 1st of every month at 06:00 UTC
    - cron: '0 6 1 * *'
  workflow_dispatch: # Allow manual trigger from the Actions tab

permissions:
  contents: write

jobs:
  update-calendar:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Scrape events and generate ICS
        run: python scrape.py --output commonwealth_calendar.ics

      - name: Commit and push if the calendar changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add commonwealth_calendar.ics
          if git diff --staged --quiet; then
            echo "No changes to commit."
          else
            git commit -m "chore: update Commonwealth Club calendar $(date -u +%Y-%m-%d)"
            git push
          fi
